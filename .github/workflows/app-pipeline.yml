# =============================================================================
# APP CI/CD PIPELINE
# =============================================================================
# Triggers on any push or PR that touches files inside the app/ directory.
#
# Flow:
#   1. Checkout → 2. Setup Python → 3. Install deps → 4. Run tests
#   5. (main only) Docker login → 6. Build & push image → 7. Deploy to EC2
#
# If tests fail at step 4, the pipeline stops — no image is built, no deploy.
# =============================================================================

name: App CI/CD

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app-pipeline.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app-pipeline.yml"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

env:
  IMAGE_NAME: devops-terraform-api
  # Docker Hub username is stored as a secret — never hardcoded
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      # =======================================================================
      # Step 1 — Checkout the repository
      # =======================================================================
      - name: Checkout code
        uses: actions/checkout@v4

      # =======================================================================
      # Step 2 — Set up Python (same version as our Docker image)
      # =======================================================================
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      # =======================================================================
      # Step 3 — Install dependencies
      # =======================================================================
      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements.txt

      # =======================================================================
      # Step 4 — Run tests (BLOCKS deploy on failure)
      # =======================================================================
      # pytest exits with non-zero if ANY test fails. This halts the pipeline
      # BEFORE any image is built or pushed. No broken code reaches production.
      - name: Run tests
        working-directory: app
        run: python -m pytest tests/test_app.py -v --tb=short

      # =======================================================================
      # Everything below runs ONLY on push to main (not on PRs)
      # =======================================================================

      # =======================================================================
      # Step 5 — Authenticate to Docker Hub
      # =======================================================================
      # Uses a personal access token (NOT password) — tokens can be scoped
      # and revoked without affecting the whole account.
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =======================================================================
      # Step 6 — Build multi-stage Docker image and push
      # =======================================================================
      # Two tags are pushed:
      #   - :latest  (what the EC2 pulls on deploy)
      #   - :<sha>   (immutable reference for rollbacks)
      # The Dockerfile is multi-stage, so only the final slim layer is pushed.
      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # =======================================================================
      # Step 7 — Deploy to EC2
      # =======================================================================
      # SSH into the running EC2 instance, pull the newest image, and replace
      # the container with zero-downtime restart.
      - name: Deploy to EC2
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            DOCKERHUB_USER="${{ secrets.DOCKERHUB_USERNAME }}"
            APP_PORT="${{ secrets.APP_PORT }}"

            echo "[deploy] Pulling latest image..."
            docker pull ${DOCKERHUB_USER}/${IMAGE_NAME}:latest

            echo "[deploy] Replacing container..."
            docker stop flask-api 2>/dev/null || true
            docker rm flask-api 2>/dev/null || true

            docker run -d \
              --name flask-api \
              --restart always \
              -p ${APP_PORT}:${APP_PORT} \
              ${DOCKERHUB_USER}/${IMAGE_NAME}:latest

            echo "[deploy] Verifying..."
            sleep 3
            docker ps --filter name=flask-api --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
            curl -s http://localhost:${APP_PORT}/health
